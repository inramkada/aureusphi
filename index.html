<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AUREUSPHI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .title {
      font-size: 3rem;
      letter-spacing: 0.2em;
      position: relative;
    }

    /* efecto chromatic */
    .title::before,
    .title::after {
      content: "AUREUSPHI";
      position: absolute;
      left: 0;
      top: 0;
      opacity: 0.6;
    }

    .title::before {
      color: red;
      transform: translate(1px, 0);
    }

    .title::after {
      color: blue;
      transform: translate(-1px, 0);
    }
  </style>
</head>
<body>
  <div class="title">AUREUSPHI</div>
</body>
</html>
