<!doctype html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AUREUS PHI</title>

  <meta name="referrer" content="no-referrer" />
  <meta http-equiv="Permissions-Policy" content="geolocation=(), microphone=(), camera=()" />
  <meta name="color-scheme" content="dark" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@100;200;300&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#000;
      --fg:rgba(255,255,255,.94);
      --muted:rgba(255,255,255,.62);
      --px:clamp(16px, 2vw, 26px);
      --py:clamp(10px, 1.4vh, 16px);
      --brand-size:clamp(13px, 1vw, 15px);
      --brand-track:.56em;
      --nav-size:clamp(10px, .8vw, 11px);
      --nav-track:.30em;
      --copy-size:clamp(6px, .62vw, 8px);
      --copy-track:.08em;
    }

    *{ box-sizing:border-box; margin:0; padding:0; }
    html,body{ width:100%; height:100%; }

    body{
      background:
        radial-gradient(circle at 50% 46%, rgba(201,168,76,.045), transparent 22%),
        radial-gradient(circle at 50% 50%, rgba(255,255,255,.018), transparent 58%),
        #000;
      color:var(--fg);
      font-family:'Josefin Sans', ui-sans-serif, system-ui, sans-serif;
      -webkit-font-smoothing:antialiased;
      text-rendering:geometricPrecision;
      overflow:hidden;
      transition: opacity 0.18s ease-in-out;
    }

    body.is-i18n-switching{ opacity:1; }

    .page{
      width:100%;
      height:100%;
      display:grid;
      grid-template-rows:auto 1fr auto;
    }

    header, footer{
      background:transparent;
      backdrop-filter:none;
      -webkit-backdrop-filter:none;
    }

    header{
      padding:var(--py) var(--px);
      position:relative;
      z-index:1000;
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      mix-blend-mode:difference;
    }

    .brand{
      position:fixed;
      top:var(--py);
      left:var(--px);
      z-index:1001;
      font-weight:200;
      font-size:var(--brand-size);
      letter-spacing:var(--brand-track);
      text-transform:uppercase;
      line-height:1;
      color:rgba(255,255,255,.86);
      white-space:nowrap;
      padding-right:var(--brand-track);
      flex:0 0 auto;
      direction:ltr;
      unicode-bidi:isolate;
      pointer-events:none;
      -webkit-user-select:none;
      user-select:none;
      -webkit-touch-callout:none;
    }

    .brand::before{
      content:"AUREUS PHI";
    }

    .right-controls{
      position:fixed;
      top:calc(var(--py) - 7px);
      right:var(--px);
      left:auto;
      z-index:1001;
      margin-left:auto;
      margin-right:0;
      display:flex;
      align-items:center;
      justify-content:flex-end;
      gap:16px;
      flex:0 0 auto;
      direction:ltr;
      unicode-bidi:isolate;
    }

    .navlink{
      color:rgba(255,255,255,.68);
      text-decoration:none;
      font-size:var(--nav-size);
      font-weight:200;
      letter-spacing:var(--nav-track);
      text-transform:uppercase;
      line-height:1;
      position:relative;
      padding-right:var(--nav-track);
      transition:color .18s ease;
      white-space:nowrap;
    }

    .navlink:hover{ color:rgba(255,255,255,.95); }

    .navlink::after{
      content:"";
      position:absolute;
      left:0; right:0; bottom:-5px;
      height:1px;
      background:rgba(255,255,255,.20);
      transform:scaleX(0);
      transform-origin:left;
      transition:transform .16s ease;
    }

    .navlink:hover::after{ transform:scaleX(1); }

    .lang-switch{
      position:relative;
      display:flex;
      align-items:center;
      flex:0 0 auto;
      direction:ltr;
      unicode-bidi:isolate;
    }

    .lang-trigger{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      width:28px;
      height:28px;
      background:none;
      border:0;
      cursor:pointer;
      padding:0;
      color:#fff;
      line-height:1;
      border-radius:10px;
      -webkit-user-select:none;
      user-select:none;
    }

    .lang-trigger:hover{ background: rgba(255,255,255,.06); }
    .lang-trigger:focus{ outline:none; }

    .globe{ width:18px; height:18px; display:block; }

    .lang-rail{
      --rail-shift: 0px;
      position:absolute;
      right: calc(100% + 10px);
      top: 50%;
      transform: translateY(-50%) translateX(var(--rail-shift));
      display:flex;
      align-items:center;
      gap:8px;
      padding:6px 8px;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(0,0,0,.86);
      border-radius: 999px;
      max-width: min(780px, calc(100vw - (2 * var(--px)) - 80px));
      overflow-x: auto;
      overflow-y: hidden;
      white-space: nowrap;
      direction:ltr;
      unicode-bidi:isolate;
      opacity:0;
      pointer-events:none;
      filter: drop-shadow(0 10px 24px rgba(0,0,0,.45));
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      transition: opacity 0.4s ease, transform 0.2s ease;
      touch-action: pan-x;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior-x: contain;
      z-index:20;
    }

    .lang-rail::-webkit-scrollbar{ height:0; }
    .lang-rail{ scrollbar-width:none; -ms-overflow-style:none; }

    .lang-switch.is-open .lang-rail{
      opacity:1;
      pointer-events:auto;
    }

    .lang-switch.open-right .lang-rail{
      right:auto;
      left: calc(100% + 10px);
    }

    [dir="rtl"] .lang-switch.open-right .lang-rail{
      right:auto;
      left: calc(100% + 10px);
    }

    .lang-pill{
      position:relative;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      border:1px solid rgba(255,255,255,.10);
      background: rgba(0,0,0,.30);
      color: rgba(255,255,255,.86);
      height:26px;
      padding: 0 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 400;
      letter-spacing: .12em;
      text-transform: uppercase;
      cursor:pointer;
      user-select:none;
      transform: translateX(10px);
      opacity: 0;
      transition: transform 220ms ease, opacity 220ms ease, background 160ms ease, border-color 160ms ease, color 160ms ease;
      -webkit-tap-highlight-color: transparent;
    }

    .lang-pill:focus{ outline:none; }
    .lang-pill[hidden]{ display:none !important; }

    .lang-switch.is-open .lang-pill{
      transform: translateX(0);
      opacity: 1;
    }

    .lang-switch.is-open .lang-pill:nth-child(1)  { transition-delay:  0ms; }
    .lang-switch.is-open .lang-pill:nth-child(2)  { transition-delay: 18ms; }
    .lang-switch.is-open .lang-pill:nth-child(3)  { transition-delay: 36ms; }
    .lang-switch.is-open .lang-pill:nth-child(4)  { transition-delay: 54ms; }
    .lang-switch.is-open .lang-pill:nth-child(5)  { transition-delay: 72ms; }
    .lang-switch.is-open .lang-pill:nth-child(6)  { transition-delay: 90ms; }
    .lang-switch.is-open .lang-pill:nth-child(7)  { transition-delay:108ms; }
    .lang-switch.is-open .lang-pill:nth-child(8)  { transition-delay:126ms; }
    .lang-switch.is-open .lang-pill:nth-child(9)  { transition-delay:144ms; }

    .lang-pill:hover{
      color:#fff;
      border-color: rgba(255,255,255,.22);
      background: rgba(255,255,255,.06);
    }

    .lang-pill::after{
      content: attr(data-label);
      position:absolute;
      bottom: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,.90);
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 10px;
      padding: 6px 8px;
      font-size: 10px;
      font-weight: 400;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: rgba(255,255,255,.92);
      opacity:0;
      pointer-events:none;
      white-space: nowrap;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .lang-pill:hover::after{ opacity:1; }

    main{
      position:relative;
      min-height:0;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
    }

    .stage{
      position:relative;
      width:100%;
      height:100%;
      display:grid;
      place-items:center;
      padding:clamp(8px, 2vh, 20px);
    }

    .canvas-wrap{
      position:relative;
      width:min(90vw, 86svh, 1120px);
      height:min(90vw, 86svh, 1120px);
      min-width:300px;
      min-height:300px;
    }

    .canvas-wrap::before{
      content:"";
      position:absolute;
      inset:-18%;
      border-radius:50%;
      background:radial-gradient(circle, rgba(201,168,76,.05), transparent 58%);
      filter:blur(24px);
      pointer-events:none;
    }

    canvas{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      display:block;
    }

    #phi-gl{
      transform-origin:50% 50%;
      will-change:transform, filter, opacity;
      backface-visibility:hidden;
    }

    footer{
      padding:10px var(--px) 14px;
    }

    .footer-inner{
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:8px;
      mix-blend-mode:difference;
      transform: translateZ(0);
    }

    .footer-links{
      display:flex;
      gap:10px;
      align-items:center;
      justify-content:center;
      flex-wrap:wrap;
      opacity:.78;
    }

    .footer-links a{
      color:#fff;
      text-decoration:none;
      font-size:clamp(8px,.76vw,10px);
      font-weight:200;
      letter-spacing:.28em;
      text-transform:uppercase;
      padding-right:.28em;
    }

    .footer-links a:hover{ color:#fff; }

    .footer-links .sep{
      width:1px;
      height:8px;
      background:rgba(255,255,255,.14);
      flex-shrink:0;
    }

    .copyright{
      font-size:var(--copy-size);
      font-weight:100;
      letter-spacing:var(--copy-track);
      color:rgba(255,255,255,.22);
      text-align:center;
      line-height:1.3;
      text-transform:uppercase;
    }

    .copyright-link{
      color:inherit;
      text-decoration:none;
    }

    [data-i18n]{
      display:inline-block;
      transition: opacity 160ms ease, transform 160ms ease, filter 160ms ease;
      will-change: opacity, transform, filter;
    }

    [data-i18n].mx-i18n-out{
      opacity:0;
      transform: translateY(2px);
      filter: blur(1px);
    }

    [data-i18n].mx-i18n-in{
      opacity:1;
      transform: translateY(0);
      filter: blur(0);
    }

    [data-i18n].mx-text-animating{
      white-space:nowrap;
    }

    .mx-char{
      display:inline-block;
      opacity:.52;
      transform:translateY(4px) scale(.985);
      filter:blur(.9px);
      text-shadow:0 0 8px rgba(201,168,76,.12), 0 0 18px rgba(201,168,76,.06);
      transition:
        opacity 320ms cubic-bezier(.22,1,.36,1),
        transform 420ms cubic-bezier(.22,1,.36,1),
        filter 360ms ease,
        text-shadow 420ms ease;
      will-change:opacity, transform, filter, text-shadow;
      backface-visibility:hidden;
      -webkit-font-smoothing:antialiased;
    }

    .mx-char.is-space,
    .mx-char.is-punct{
      opacity:1;
      transform:none;
      filter:none;
      text-shadow:none;
    }

    .mx-char.is-settled{
      opacity:1;
      transform:translateY(0) scale(1);
      filter:blur(0);
      text-shadow:none;
    }

    .canvas-wrap.is-phi-react #phi-gl{
      animation: phiReact 980ms cubic-bezier(.18,.98,.18,1);
    }

    @keyframes phiReact{
      0%{
        transform:scale(1) rotate(0deg);
        filter:drop-shadow(0 0 0 rgba(201,168,76,0));
        opacity:1;
      }
      12%{
        transform:scale(1.035) rotate(104deg);
        filter:drop-shadow(0 0 10px rgba(201,168,76,.24)) drop-shadow(0 0 22px rgba(201,168,76,.12));
        opacity:1;
      }
      28%{
        transform:scale(1.052) rotate(252deg);
        filter:drop-shadow(0 0 16px rgba(201,168,76,.34)) drop-shadow(0 0 34px rgba(201,168,76,.18));
        opacity:1;
      }
      44%{
        transform:scale(1.018) rotate(360deg);
        filter:drop-shadow(0 0 13px rgba(201,168,76,.28)) drop-shadow(0 0 28px rgba(201,168,76,.14));
        opacity:1;
      }
      62%{
        transform:scale(1.008) rotate(358.6deg);
        filter:drop-shadow(0 0 9px rgba(201,168,76,.18)) drop-shadow(0 0 18px rgba(201,168,76,.09));
        opacity:1;
      }
      78%{
        transform:scale(1.003) rotate(360.35deg);
        filter:drop-shadow(0 0 5px rgba(201,168,76,.10));
        opacity:1;
      }
      100%{
        transform:scale(1) rotate(360deg);
        filter:drop-shadow(0 0 0 rgba(201,168,76,0));
        opacity:1;
      }
    }

    [dir="rtl"] .topbar{ flex-direction:row; }
    [dir="rtl"] .right-controls{ margin-left:auto; margin-right:0; flex-direction:row; }
    [dir="rtl"] .navlink::after{ transform-origin:left; }
    [dir="rtl"] .footer-links{ flex-direction:row; }

    @media (max-width: 720px){
      .topbar{
        align-items:flex-start;
      }

      .right-controls{
        gap:12px;
      }

      .canvas-wrap{
        width:min(94vw, 78svh, 860px);
        height:min(94vw, 78svh, 860px);
        min-width:260px;
        min-height:260px;
      }

      .lang-rail{
        right:0;
        left:auto;
        top:calc(100% + 10px);
        transform: translateX(var(--rail-shift));
        max-width: min(92vw, 520px);
      }

      [dir="rtl"] .lang-rail{
        right:0;
        left:auto;
      }
    }

    @media (max-width: 560px){
      .footer-links .sep{ display:none; }

      .brand{
        font-size:clamp(11px, 3vw, 13px);
      }

      .navlink{
        font-size:10px;
      }

      .canvas-wrap{
        width:min(96vw, 72svh, 760px);
        height:min(96vw, 72svh, 760px);
        min-width:250px;
        min-height:250px;
      }
    }

    @media (orientation: portrait){
      .canvas-wrap{
        width:min(98vw, 78svh, 980px);
        height:min(98vw, 78svh, 980px);
      }
    }

    @media (orientation: landscape) and (max-height: 620px){
      .canvas-wrap{
        width:min(82vw, 88svh, 900px);
        height:min(82vw, 88svh, 900px);
      }
    }

    @media (min-width: 1200px) and (min-height: 780px){
      .canvas-wrap{
        width:min(84vw, 88svh, 1240px);
        height:min(84vw, 88svh, 1240px);
      }
    }

    html[dir="rtl"], body{ overflow-x: hidden; }
    [dir="rtl"] .page{ overflow-x: clip; }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <div class="topbar">
        <div class="brand" aria-label="AUREUS PHI" role="img"></div>

        <div class="right-controls">
          <div class="lang-switch" id="lang-switch">
            <button class="lang-trigger" aria-label="Language selector" type="button">
              <svg class="globe" viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="1.7"/>
                <path d="M3 12h18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
                <path d="M12 3c3 3 3 15 0 18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
                <path d="M12 3c-3 3-3 15 0 18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
              </svg>
            </button>

            <div class="lang-rail" id="lang-rail" aria-label="Languages">
              <button class="lang-pill" data-lang="en" data-label="English" type="button">EN</button>
              <button class="lang-pill" data-lang="es" data-label="Español" type="button">ES</button>
              <button class="lang-pill" data-lang="ca" data-label="Català" type="button">CA</button>
              <button class="lang-pill" data-lang="eu" data-label="Euskara" type="button">EU</button>
              <button class="lang-pill" data-lang="zh" data-label="中文 (Chinese)" type="button">ZH</button>
              <button class="lang-pill" data-lang="hi" data-label="हिंदी (Hindi)" type="button">HI</button>
              <button class="lang-pill" data-lang="ar" data-label="العربية (Arabic)" type="button">AR</button>
              <button class="lang-pill" data-lang="ru" data-label="Русский" type="button">RU</button>
              <button class="lang-pill" data-lang="fr" data-label="Français" type="button">FR</button>
            </div>
          </div>

          <a class="navlink" href="mailto:info@microretailx.com" data-i18n="nav.contact">Contact</a>
        </div>
      </div>
    </header>

    <main>
      <section class="stage">
        <div class="canvas-wrap" id="wrap">
          <canvas id="phi-gl"></canvas>
        </div>
      </section>
    </main>

    <footer>
      <div class="footer-inner">
        <div class="footer-links">
          <a href="https://www.microretailx.com/terms" target="_blank" rel="noopener noreferrer" data-i18n="footer.terms">Terms</a>
          <div class="sep"></div>
          <a href="https://www.microretailx.com/privacy" target="_blank" rel="noopener noreferrer" data-i18n="footer.privacy">Privacy</a>
          <div class="sep"></div>
          <a href="https://www.microretailx.com/cookies" target="_blank" rel="noopener noreferrer" data-i18n="footer.cookies">Cookies</a>
          <div class="sep"></div>
          <a href="https://www.microretailx.com/legal" target="_blank" rel="noopener noreferrer" data-i18n="footer.legal">Legal</a>
        </div>

        <div class="copyright">
          <a class="copyright-link" href="https://www.microretailx.com" target="_blank" rel="noopener noreferrer">
            © 2026 MICRORETAILX LLC
          </a>
        </div>
      </div>
    </footer>
  </div>

  <script>
    (function(){
      const canvas = document.getElementById('phi-gl');
      const wrap = document.getElementById('wrap');

      const PHI = 1.6180339887;
      const GOLD = [201 / 255, 168 / 255, 76 / 255];

      const gl = canvas.getContext('webgl', {
        alpha:true,
        antialias:true,
        premultipliedAlpha:true,
        preserveDrawingBuffer:false,
        powerPreference:'high-performance'
      });

      if (!gl){
        const ctx = canvas.getContext('2d');
        let W=560,H=560,dpr=1;

        function resize2d(){
          const rect=wrap.getBoundingClientRect();
          dpr=Math.min(window.devicePixelRatio||1,2);
          W=Math.max(220,Math.round(rect.width));
          H=Math.max(220,Math.round(rect.height));
          canvas.width=Math.round(W*dpr);
          canvas.height=Math.round(H*dpr);
          canvas.style.width=W+'px';
          canvas.style.height=H+'px';
          ctx.setTransform(dpr,0,0,dpr,0,0);
        }

        function drawFallback(){
          ctx.clearRect(0,0,W,H);
          ctx.save();
          ctx.translate(W/2,H/2);
          ctx.strokeStyle='rgba(201,168,76,.95)';
          ctx.lineWidth=Math.max(1.8,W*.00345);
          ctx.lineCap='round';
          ctx.lineJoin='round';
          const r=W*.154;
          ctx.beginPath();
          ctx.arc(0,0,r,0,Math.PI*2);
          ctx.moveTo(0,-r*1.7);
          ctx.lineTo(0,r*1.7);
          ctx.stroke();
          ctx.restore();
        }

        resize2d();
        drawFallback();
        window.addEventListener('resize',()=>{resize2d();drawFallback();});
        return;
      }

      const DPR_MAX = 2;
      let W = 560, H = 560, dpr = 1;
      let startTime = performance.now();
      let drawProgress = 0;
      let targetProgress = 0;
      let vertices = new Float32Array();
      let meta = new Float32Array();
      let vertexCount = 0;
      let rafId = null;
      let visible = true;

      function compile(type, source){
        const sh = gl.createShader(type);
        gl.shaderSource(sh, source);
        gl.compileShader(sh);
        if (!gl.getShaderParameter(sh, gl.COMPILE_STATUS)){
          throw new Error(gl.getShaderInfoLog(sh) || 'Shader compile error');
        }
        return sh;
      }

      function program(vs, fs){
        const p = gl.createProgram();
        gl.attachShader(p, compile(gl.VERTEX_SHADER, vs));
        gl.attachShader(p, compile(gl.FRAGMENT_SHADER, fs));
        gl.linkProgram(p);
        if (!gl.getProgramParameter(p, gl.LINK_STATUS)){
          throw new Error(gl.getProgramInfoLog(p) || 'Program link error');
        }
        return p;
      }

      const vs = `
        attribute vec2 a_pos;
        attribute float a_line;
        uniform vec2 u_resolution;
        uniform float u_pxRatio;
        uniform float u_progress;
        uniform float u_time;
        varying float v_line;
        varying float v_reveal;
        varying float v_alpha;

        void main(){
          vec2 zeroToOne = a_pos / u_resolution;
          vec2 clip = zeroToOne * 2.0 - 1.0;
          clip.y = -clip.y;

          float breathe = 1.0 + 0.0035 * sin(u_time * 1.35);
          clip *= breathe;

          gl_Position = vec4(clip, 0.0, 1.0);
          gl_PointSize = mix(2.0, 4.4, a_line) * u_pxRatio;

          v_line = a_line;
          v_reveal = smoothstep(a_line - 0.018, a_line + 0.035, u_progress);
          v_alpha = v_reveal;
        }
      `;

      const fs = `
        precision mediump float;
        uniform vec3 u_gold;
        uniform float u_time;
        varying float v_line;
        varying float v_alpha;

        void main(){
          vec2 uv = gl_PointCoord.xy - 0.5;
          float d = length(uv);
          float core = smoothstep(0.50, 0.18, d);
          float halo = smoothstep(0.50, 0.02, d) * 0.25;

          float shimmer = 0.86 + 0.14 * sin(u_time * 2.1 + v_line * 18.0);
          vec3 col = u_gold * shimmer + vec3(1.0, .92, .70) * 0.10;
          float alpha = (core + halo) * v_alpha;

          gl_FragColor = vec4(col, alpha);
        }
      `;

      const p = program(vs, fs);
      const loc = {
        pos: gl.getAttribLocation(p, 'a_pos'),
        line: gl.getAttribLocation(p, 'a_line'),
        resolution: gl.getUniformLocation(p, 'u_resolution'),
        pxRatio: gl.getUniformLocation(p, 'u_pxRatio'),
        progress: gl.getUniformLocation(p, 'u_progress'),
        time: gl.getUniformLocation(p, 'u_time'),
        gold: gl.getUniformLocation(p, 'u_gold')
      };

      const posBuffer = gl.createBuffer();
      const metaBuffer = gl.createBuffer();

      function pc(e,a,b){
        return Math.max(0,Math.min(1,(e-a)/(b-a)));
      }

      function ei(t){
        return t < .5 ? 2*t*t : -1+(4-2*t)*t;
      }

      function buildGeometry(){
        const PAD = W * 0.055;
        const RW = W - 2 * PAD;
        const RH = RW / PHI;

        let rx = PAD, ry = (H - RH) / 2, rw = RW, rh = RH;
        const rawArcs = [];

        for (let i=0;i<8;i++){
          const d=i%4; let sq, ax, ay, sa;
          if (d===0){ sq=rh; ax=rx+sq; ay=ry+sq; sa=Math.PI; rx+=sq; rw-=sq; }
          else if (d===1){ sq=rw; ax=rx; ay=ry+sq; sa=-Math.PI/2; ry+=sq; rh-=sq; }
          else if (d===2){ sq=rh; ax=rx+rw-sq; ay=ry; sa=0; rw-=sq; }
          else { sq=rw; ax=rx+rw; ay=ry+rh-sq; sa=Math.PI/2; rh-=sq; }
          rawArcs.push({ax,ay,r:sq,sa});
          if (rw<1 || rh<1) break;
        }

        const PHI_IDX = 4;
        const rawPhi = rawArcs[PHI_IDX];
        const TARGET_CR = W * 0.154;
        const scale = TARGET_CR / rawPhi.r;

        function tr(ax,ay){
          return { x:(ax-rawPhi.ax)*scale + W/2, y:(ay-rawPhi.ay)*scale + H/2 };
        }

        const arcs = rawArcs.map(({ax,ay,r,sa})=>{
          const t = tr(ax,ay);
          return { ax:t.x, ay:t.y, r:r*scale, sa };
        });

        const phiArc = arcs[PHI_IDX];
        const CX = phiArc.ax, CY = phiArc.ay, CR = phiArc.r;

        const pts = [];
        const lineValues = [];

        function addPoint(x,y,lineValue){
          pts.push(x,y);
          lineValues.push(lineValue);
        }

        let totalRaw = 0;
        const all = [];

        for (let i=0;i<=PHI_IDX;i++){
          const {ax,ay,r,sa}=arcs[i];
          const steps=Math.max(28,Math.floor(r*1.35));
          for(let j=(i===0?0:1);j<=steps;j++){
            const a=sa+(Math.PI/2)*(j/steps);
            all.push({x:ax+r*Math.cos(a), y:ay+r*Math.sin(a), lift:false});
          }
        }

        const circleStartA=phiArc.sa+Math.PI/2;
        for(let i=1;i<=320;i++){
          const a=circleStartA+(Math.PI*2)*(i/320);
          all.push({x:CX+CR*Math.cos(a), y:CY+CR*Math.sin(a), lift:false});
        }

        const EXT=CR*0.7;
        all.push({x:CX, y:CY-CR-EXT, lift:true});
        for(let i=1;i<=120;i++){
          all.push({x:CX, y:(CY-CR-EXT)+(CR*2+EXT*2)*(i/120), lift:false});
        }

        const lengths = [0];
        for (let i=1;i<all.length;i++){
          const d = all[i].lift ? 0 : Math.hypot(all[i].x-all[i-1].x, all[i].y-all[i-1].y);
          lengths.push(lengths[i-1]+d);
        }
        totalRaw = lengths[lengths.length-1] || 1;

        for (let i=0;i<all.length;i++){
          addPoint(all[i].x, all[i].y, lengths[i]/totalRaw);
        }

        vertices = new Float32Array(pts);
        meta = new Float32Array(lineValues);
        vertexCount = lineValues.length;

        gl.bindBuffer(gl.ARRAY_BUFFER, posBuffer);
        gl.bufferData(gl.ARRAY_BUFFER, vertices, gl.STATIC_DRAW);

        gl.bindBuffer(gl.ARRAY_BUFFER, metaBuffer);
        gl.bufferData(gl.ARRAY_BUFFER, meta, gl.STATIC_DRAW);
      }

      function resize(){
        const rect = wrap.getBoundingClientRect();
        dpr = Math.min(window.devicePixelRatio || 1, DPR_MAX);

        W = Math.max(220, Math.round(rect.width));
        H = Math.max(220, Math.round(rect.height));

        canvas.width = Math.round(W * dpr);
        canvas.height = Math.round(H * dpr);
        canvas.style.width = W + 'px';
        canvas.style.height = H + 'px';

        gl.viewport(0,0,canvas.width,canvas.height);
        buildGeometry();
        startTime = performance.now();
        drawProgress = 0;
        targetProgress = 1;
      }

      function draw(now){
        if (!visible) return;

        const t = (now - startTime) / 1000;
        const intro = ei(pc((now - startTime), 280, 2800));
        targetProgress = Math.max(targetProgress, intro);
        drawProgress += (targetProgress - drawProgress) * 0.055;

        gl.clearColor(0,0,0,0);
        gl.clear(gl.COLOR_BUFFER_BIT);
        gl.enable(gl.BLEND);
        gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);

        gl.useProgram(p);

        gl.bindBuffer(gl.ARRAY_BUFFER, posBuffer);
        gl.enableVertexAttribArray(loc.pos);
        gl.vertexAttribPointer(loc.pos, 2, gl.FLOAT, false, 0, 0);

        gl.bindBuffer(gl.ARRAY_BUFFER, metaBuffer);
        gl.enableVertexAttribArray(loc.line);
        gl.vertexAttribPointer(loc.line, 1, gl.FLOAT, false, 0, 0);

        gl.uniform2f(loc.resolution, W, H);
        gl.uniform1f(loc.pxRatio, dpr);
        gl.uniform1f(loc.progress, drawProgress);
        gl.uniform1f(loc.time, t);
        gl.uniform3f(loc.gold, GOLD[0], GOLD[1], GOLD[2]);

        gl.drawArrays(gl.POINTS, 0, vertexCount);

        rafId = requestAnimationFrame(draw);
      }

      let resizeTimer=null;
      window.addEventListener('resize',()=>{
        clearTimeout(resizeTimer);
        resizeTimer=setTimeout(resize,120);
      });

      document.addEventListener('visibilitychange',()=>{
        visible = !document.hidden;
        if (visible && !rafId){
          startTime = performance.now() - 3000;
          rafId = requestAnimationFrame(draw);
        }
        if (!visible && rafId){
          cancelAnimationFrame(rafId);
          rafId = null;
        }
      });

      window.__phiBoost = function(){
        targetProgress = 1;
        drawProgress = Math.max(drawProgress, .94);
      };

      resize();
      rafId = requestAnimationFrame(draw);
    })();

    (function(){
      const I18N = {
        en: {
          "nav.contact": "Contact",
          "footer.terms": "Terms",
          "footer.privacy": "Privacy",
          "footer.cookies": "Cookies",
          "footer.legal": "Legal"
        },

        es: {
          "nav.contact": "Contacto",
          "footer.terms": "Términos",
          "footer.privacy": "Privacidad",
          "footer.cookies": "Cookies",
          "footer.legal": "Legal"
        },

        ca: {
          "nav.contact": "Contacte",
          "footer.terms": "Termes",
          "footer.privacy": "Privacitat",
          "footer.cookies": "Cookies",
          "footer.legal": "Legal"
        },

        eu: {

          "footer.cookies": "Cookieak",

        },

        fr: {
          "nav.contact": "Contact",
          "footer.terms": "Conditions d’utilisation",
          "footer.privacy": "Confidentialité",
          "footer.cookies": "Cookies",
          "footer.legal": "Mentions légales"
        },

        ru: {
          "nav.contact": "Контакты",
          "footer.terms": "Условия",
          "footer.privacy": "Конфиденциальность",
          "footer.cookies": "Файлы cookie",
          "footer.legal": "Юридическая информация"
        },

        ar: {
          "nav.contact": "اتصال",
          "footer.terms": "الشروط",
          "footer.privacy": "الخصوصية",
          "footer.cookies": "ملفات تعريف الارتباط",
          "footer.legal": "قانوني"
        },

        hi: {
          "nav.contact": "संपर्क",
          "footer.terms": "शर्तें",
          "footer.privacy": "गोपनीयता",
          "footer.cookies": "कुकीज़",
          "footer.legal": "कानूनी"
        },

        zh: {
          "nav.contact": "联系",
          "footer.terms": "使用条款",
          "footer.privacy": "隐私",
          "footer.cookies": "Cookies",
          "footer.legal": "法律声明"
        }
      };

      const RTL_LANGS = new Set(["ar"]);
      const DEFAULT_LANG = "en";
      const storageKey = "ap_lang";

      function detectBrowserLang(){
        const supported = new Set(Object.keys(I18N));
        const prefs = (Array.isArray(navigator.languages) && navigator.languages.length)
          ? navigator.languages
          : [navigator.language || navigator.userLanguage || DEFAULT_LANG];

        for (const raw of prefs){
          if (!raw) continue;
          const base = String(raw).toLowerCase().slice(0,2);
          if (supported.has(base)) return base;
        }
        return null;
      }

      function getLang(){
        const saved = localStorage.getItem(storageKey);
        if (saved && I18N[saved]) return saved;
        const detected = detectBrowserLang();
        if (detected) return detected;
        return DEFAULT_LANG;
      }

      function setLang(lang){ localStorage.setItem(storageKey, lang); }

      const POOL_LATIN = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
      const POOL_CYR   = "АБВГДЕЖЗИЙКЛМНОПРСТУФХЦЧШЩЫЭЮЯ";
      const POOL_DEV   = "अआइईउऊएऐओऔकखगघचछजझटठडढतथदधनपफबभमयरलवशषसह";
      const POOL_CJK   = "的一是在不了有人这中大为上个国我以要他时来用们生到作地于出就分对成会可主发年动同工也能下过子说产种面而方后多定行学法所民得经";
      const POOL_AR    = "ابتثجحخدذرزسشصضطظعغفقكلمنهوي";

      function poolForLang(lang){
        if (lang === "ru") return POOL_CYR;
        if (lang === "hi") return POOL_DEV;
        if (lang === "zh") return POOL_CJK;
        if (lang === "ar") return POOL_AR;
        return POOL_LATIN;
      }

      function isPunctuation(c){
        return /[\.\,\!\?\:\;\-\—\–\(\)\[\]\/\&\+%#@€$£"'،؛]/.test(c);
      }

      function randFromPool(pool, fallback){
        if (!pool || !pool.length) return fallback || "";
        return pool[(Math.random() * pool.length) | 0];
      }

      function animatePremiumText(el, finalText, lang){
        const base = String(finalText ?? "");
        const pool = poolForLang(lang);
        const isRTL = RTL_LANGS.has(lang);

        if (el.__mxTimers){
          el.__mxTimers.forEach(t => clearTimeout(t));
        }
        el.__mxTimers = [];

        el.classList.add("mx-text-animating");
        el.textContent = "";

        const frag = document.createDocumentFragment();
        const spans = [];

        for (let i = 0; i < base.length; i++){
          const c = base[i];
          const span = document.createElement("span");
          span.className = "mx-char";

          if (/\s/.test(c)){
            span.classList.add("is-space", "is-settled");
            span.textContent = c === " " ? "\u00A0" : c;
          } else if (isPunctuation(c)){
            span.classList.add("is-punct", "is-settled");
            span.textContent = c;
          } else {
            span.textContent = randFromPool(pool, c);
          }

          frag.appendChild(span);
          spans.push(span);
        }

        el.appendChild(frag);

        const animIndices = [];
        spans.forEach((span, idx) => {
          if (!span.classList.contains("is-space") && !span.classList.contains("is-punct")) animIndices.push(idx);
        });
        const ordered = isRTL ? animIndices.slice().reverse() : animIndices.slice();

        requestAnimationFrame(() => {
          ordered.forEach((idx, orderPos) => {
            const span = spans[idx];
            const finalChar = base[idx];
            const baseDelay = 36 * orderPos;

            const t1 = setTimeout(() => {
              span.textContent = randFromPool(pool, finalChar);
            }, baseDelay);

            const t2 = setTimeout(() => {
              span.textContent = finalChar;
              span.classList.add("is-settled");
            }, baseDelay + 88);

            el.__mxTimers.push(t1, t2);
          });

          const cleanup = setTimeout(() => {
            el.classList.remove("mx-text-animating");
          }, (ordered.length * 36) + 380);

          el.__mxTimers.push(cleanup);
        });
      }

      function triggerPhiReaction(){
        if (typeof window.__phiBoost === "function") window.__phiBoost();
        const wrap = document.getElementById("wrap");
        if (!wrap) return;
        wrap.classList.remove("is-phi-react");
        void wrap.offsetWidth;
        wrap.classList.add("is-phi-react");
        const clear = () => {
          wrap.classList.remove("is-phi-react");
          wrap.removeEventListener("animationend", clear, true);
        };
        wrap.addEventListener("animationend", clear, true);
        setTimeout(clear, 1180);
      }

      function applyLang(lang){
        document.body.classList.add("is-i18n-switching");

        try{
          const dict = I18N[lang] || I18N[DEFAULT_LANG];
          const html = document.documentElement;
          html.lang = lang;
          html.dir = RTL_LANGS.has(lang) ? "rtl" : "ltr";

          const switchEl = document.getElementById("lang-switch");
          switchEl?.classList.remove("is-open");
          switchEl?.classList.remove("open-right");

          const railEl = document.getElementById("lang-rail");
          if (railEl){
            railEl.querySelectorAll(".lang-pill").forEach(btn => {
              const l = btn.getAttribute("data-lang");
              btn.hidden = (l === lang);
            });
            railEl.scrollLeft = 0;
          }

          const nodes = Array.from(document.querySelectorAll("[data-i18n]"));
          nodes.forEach(el => el.classList.add("mx-i18n-out"));

          setTimeout(() => {
            nodes.forEach(el => {
              const key = el.getAttribute("data-i18n");
              if (!key) return;
              const val = dict[key] ?? I18N[DEFAULT_LANG][key];
              if (typeof val !== "string") return;

              animatePremiumText(el, val, lang);

              el.classList.remove("mx-i18n-out");
              el.classList.add("mx-i18n-in");
            });

            triggerPhiReaction();
            setTimeout(() => nodes.forEach(el => el.classList.remove("mx-i18n-in")), 520);
          }, 160);

        } finally {
          setTimeout(() => document.body.classList.remove("is-i18n-switching"), 520);
        }
      }

      window.__apApplyLang = applyLang;
      applyLang(getLang());

      (function(){
        const rail = document.getElementById("lang-rail");
        if (!rail) return;

        const isTouch = ("ontouchstart" in window) || (navigator.maxTouchPoints > 0);
        const TAP_MOVE_PX = 14;
        const TAP_SCROLL_PX = 6;

        let startX = 0, startY = 0, startScroll = 0;
        let dragging = false;
        let pressedBtn = null;

        function ptFromTouch(t){ return { x: t.clientX, y: t.clientY }; }

        rail.addEventListener("touchstart", (e) => {
          const targetBtn = e.target && e.target.closest ? e.target.closest(".lang-pill") : null;
          pressedBtn = targetBtn && rail.contains(targetBtn) ? targetBtn : null;

          if (!e.touches || e.touches.length === 0) return;
          const p = ptFromTouch(e.touches[0]);
          startX = p.x;
          startY = p.y;
          startScroll = rail.scrollLeft;
          dragging = false;

          if (pressedBtn) e.preventDefault();
        }, { passive:false });

        rail.addEventListener("touchmove", (e) => {
          if (!e.touches || e.touches.length === 0) return;
          const p = ptFromTouch(e.touches[0]);
          const dx = Math.abs(p.x - startX);
          const dy = Math.abs(p.y - startY);
          const ds = Math.abs(rail.scrollLeft - startScroll);
          if (dx > TAP_MOVE_PX || dy > TAP_MOVE_PX || ds > TAP_SCROLL_PX) dragging = true;
        }, { passive:true });

        rail.addEventListener("touchend", (e) => {
          if (dragging){ pressedBtn = null; return; }

          let btn = pressedBtn;
          if (!btn){
            const ct = e.changedTouches && e.changedTouches[0];
            if (ct){
              const p = ptFromTouch(ct);
              const el = document.elementFromPoint(p.x, p.y);
              const maybe = el && el.closest ? el.closest(".lang-pill") : null;
              if (maybe && rail.contains(maybe)) btn = maybe;
            }
          }

          if (!btn || btn.hidden){ pressedBtn = null; return; }

          e.preventDefault();
          e.stopPropagation();

          const lang = btn.getAttribute("data-lang") || DEFAULT_LANG;
          setLang(lang);
          window.__apApplyLang(lang);

          btn.blur();
          if (document.activeElement && document.activeElement.blur) document.activeElement.blur();
          pressedBtn = null;
        }, { passive:false });

        rail.addEventListener("touchcancel", () => {
          dragging = false;
          pressedBtn = null;
        }, { passive:true });

        rail.addEventListener("click", (e) => {
          e.preventDefault();
          e.stopPropagation();
        }, true);

        if (!isTouch){
          let downX = 0, downY = 0;
          let pDragging = false;

          rail.addEventListener("pointerdown", (e) => {
            const btn = e.target && e.target.closest ? e.target.closest(".lang-pill") : null;
            if (btn) e.preventDefault();
            downX = e.clientX; downY = e.clientY;
            pDragging = false;
          }, { passive:false });

          rail.addEventListener("pointermove", (e) => {
            if (Math.abs(e.clientX - downX) > 10 || Math.abs(e.clientY - downY) > 10) pDragging = true;
          }, { passive:true });

          rail.addEventListener("pointerup", (e) => {
            if (pDragging) return;
            const el = document.elementFromPoint(e.clientX, e.clientY);
            const btn = el && el.closest ? el.closest(".lang-pill") : null;
            if (!btn || !rail.contains(btn) || btn.hidden) return;

            const lang = btn.getAttribute("data-lang") || DEFAULT_LANG;
            setLang(lang);
            window.__apApplyLang(lang);

            btn.blur();
            if (document.activeElement && document.activeElement.blur) document.activeElement.blur();
          }, { passive:true });
        }
      })();

      (function(){
        const switchEl = document.getElementById('lang-switch');
        const railEl   = document.getElementById('lang-rail');
        if (!switchEl || !railEl) return;

        let openTimer = null;
        let closeTimer = null;
        let locked = false;

        const OPEN_DELAY_MS  = 500;
        const CLOSE_DELAY_MS = 3000;

        let firstOpen = true;

        function clearTimers(){
          if (openTimer)  { clearTimeout(openTimer);  openTimer = null; }
          if (closeTimer) { clearTimeout(closeTimer); closeTimer = null; }
        }

        function ensureStartVisibleOnce(){
          if (!firstOpen) return;
          railEl.scrollLeft = 0;
          firstOpen = false;
        }

        function resetShift(){
          railEl.style.setProperty('--rail-shift', '0px');
        }

        function clampRailIntoViewport(){
          const vw = window.innerWidth || document.documentElement.clientWidth;
          const margin = 8;

          resetShift();

          const rect = railEl.getBoundingClientRect();
          let shift = 0;

          if (rect.left < margin){
            shift = (margin - rect.left);
          } else if (rect.right > (vw - margin)){
            shift = - (rect.right - (vw - margin));
          }

          if (shift !== 0){
            railEl.style.setProperty('--rail-shift', `${Math.round(shift)}px`);
          }
        }

        function placeRailSmart(){
          switchEl.classList.remove('open-right');
          resetShift();

          const vw = window.innerWidth || document.documentElement.clientWidth;
          const margin = 8;

          let rect = railEl.getBoundingClientRect();

          if (rect.left < -margin){
            switchEl.classList.add('open-right');
            rect = railEl.getBoundingClientRect();
          }

          if (rect.right > vw + margin){
            switchEl.classList.remove('open-right');
          }

          clampRailIntoViewport();
        }

        function openRail(){
          const y = window.scrollY || document.documentElement.scrollTop || 0;
          requestAnimationFrame(() => window.scrollTo(0, y));

          switchEl.classList.add('is-open');

          requestAnimationFrame(() => {
            ensureStartVisibleOnce();
            placeRailSmart();
          });
        }

        function closeRail(){
          locked = false;
          switchEl.classList.remove('is-open');
          switchEl.classList.remove('open-right');
          resetShift();
        }

        function scheduleOpen(){
          clearTimers();
          openTimer = setTimeout(() => openRail(), OPEN_DELAY_MS);
        }

        function scheduleClose(){
          clearTimers();
          closeTimer = setTimeout(() => closeRail(), CLOSE_DELAY_MS);
        }

        switchEl.addEventListener('pointerenter', () => {
          if (closeTimer) { clearTimeout(closeTimer); closeTimer = null; }
          if (switchEl.classList.contains('is-open')) return;
          scheduleOpen();
        });

        switchEl.addEventListener('pointerleave', () => {
          if (!switchEl.classList.contains('is-open')) { clearTimers(); return; }
          if (locked) return;
          scheduleClose();
        });

        railEl.addEventListener('pointerenter', () => {
          locked = true;
          clearTimers();
          openRail();
        });

        railEl.addEventListener('pointerleave', () => {
          locked = false;
          scheduleClose();
        });

        const trigger = switchEl.querySelector('.lang-trigger');
        let _touchHandled = false;

        function toggleRail(){
          clearTimers();
          if (switchEl.classList.contains('is-open')) closeRail();
          else openRail();

          trigger?.blur();
          if (document.activeElement && document.activeElement.blur) document.activeElement.blur();
        }

        trigger?.addEventListener('touchstart', (e) => {
          _touchHandled = true;
          e.preventDefault();
          toggleRail();
          setTimeout(() => { _touchHandled = false; }, 450);
        }, { passive: false });

        trigger?.addEventListener('click', (e) => {
          if (_touchHandled) return;
          e.preventDefault();
          toggleRail();
        });

        window.addEventListener('resize', () => {
          if (!switchEl.classList.contains('is-open')) return;
          requestAnimationFrame(() => placeRailSmart());
        });
      })();
    })();
  </script>
